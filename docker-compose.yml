version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dribble
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dribble-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  dribble-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server/app:/app/app:cached
      - ./server/pyproject.toml:/app/pyproject.toml:cached
    ports:
      - "8000:8000"
    environment:
      - IN_DOCKER=1
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - WATCHFILES_FORCE_POLLING=1
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/dribble
    networks:
      - dribble-network
    depends_on:
      postgres:
        condition: service_healthy

  dribble-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://dribble-server:8000
      - NODE_ENV=development
    depends_on:
      - dribble-server
    networks:
      - dribble-network

networks:
  dribble-network:
    driver: bridge

volumes:
  postgres_data:
