services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dribble-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dribble-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: dribble-migrations:latest
    build:
      context: ./server
      dockerfile: Dockerfile.migrations
    volumes:
      - ./server/app/alembic:/app/app/alembic:cached
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dribble-network
    command: upgrade head

  server:
    image: dribble-server:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server/app:/app/app:cached
      - ./server/pyproject.toml:/app/pyproject.toml:cached
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - IN_DOCKER=1
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - WATCHFILES_FORCE_POLLING=1
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - DOCKER_NETWORK=dribble-network
      - ENCRYPTION_KEY=dribble_encryption_key
      - ENCRYPTION_SECRET=dribble_encryption_secret
    networks:
      - dribble-network
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://server:8000
      - NODE_ENV=development
    depends_on:
      - server
    networks:
      - dribble-network

networks:
  dribble-network:
    external: true
    name: dribble-network

volumes:
  postgres_data:
  redis_data:
