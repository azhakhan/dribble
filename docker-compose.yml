version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dribble
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dribble-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dribble-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker-postgres:
    build:
      context: ./worker/postgres
      dockerfile: Dockerfile
    image: dribble-worker-postgres:latest
    networks:
      - dribble-network

  dribble-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server/app:/app/app:cached
      - ./server/pyproject.toml:/app/pyproject.toml:cached
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - IN_DOCKER=1
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - WATCHFILES_FORCE_POLLING=1
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/dribble
      - REDIS_URL=redis://redis:6379/0
      - DOCKER_NETWORK=dribble-network
    networks:
      - dribble-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dribble-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://dribble-server:8000
      - NODE_ENV=development
    depends_on:
      - dribble-server
    networks:
      - dribble-network

networks:
  dribble-network:
    external: true
    name: dribble-network

volumes:
  postgres_data:
  redis_data:
