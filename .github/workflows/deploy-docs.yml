name: Deploy Documentation to GitHub Pages

on:
  # Runs on pushes targeting the az/v2 branch
  push:
    branches: ["az/v2"]
    paths: ["docs/**"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs # Ensures all run commands are relative to /docs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Clean install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: List built files (for debugging)
        run: |
          echo "Build directory contents:"
          ls -la build
          echo "Checking for index.html:"
          ls -la build/index.html
          echo "Checking for CNAME:"
          ls -la build/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build # still relative to the repo root

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
