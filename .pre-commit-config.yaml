repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.12
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix, --line-length=100]
        types_or: [python, pyi]
        exclude: server/app/alembic/versions/
      # Run the formatter.
      - id: ruff-format
        args: [--line-length=100]
        types_or: [python, pyi]
        exclude: server/app/alembic/versions/

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        entry: bash -c 'cd client && npx eslint --fix --max-warnings=100'
        types: [file]
        files: \.(js|ts|tsx)$
        exclude: node_modules|\.d\.ts$|client/src/components/ui/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]
        exclude: node_modules

  - repo: local
    hooks:
      - id: typescript-check
        name: TypeScript type check
        entry: bash -c 'cd client && yarn tsc --noEmit'
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
        exclude: node_modules
